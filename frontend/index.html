<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>YiwoDraftViewer</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/diff.css">
  <link rel="stylesheet" href="/css/list.css">
  <link rel="stylesheet" href="/css/wordcount.css">
  <link rel="stylesheet" href="/css/toolbar.css">
  <link rel="stylesheet" href="/css/toast.css">
  <link rel="stylesheet" href="/css/search.css">
</head>
<body>
  <div id="app" class="empty">
    <div id="search-bar" class="search-bar hidden">
      <input id="search-input" type="text" placeholder="搜索..." spellcheck="false" autocomplete="off">
      <span id="search-counter" class="search-counter zero">0 / 0</span>
      <button id="search-prev" class="search-nav" disabled title="上一个 (Shift+Cmd+G)">↑</button>
      <button id="search-next" class="search-nav" disabled title="下一个 (Cmd+G)">↓</button>
      <button id="search-close" class="search-close" title="关闭 (Esc)">✕</button>
    </div>
    <main id="main-view" class="main-view">
      <div class="empty-hint">拖一个 .md 文件进来，或菜单 File → Open</div>
    </main>
    <aside id="sidebar" class="sidebar">
      <div id="wordcount" class="wordcount hidden">
        <span class="wordcount-label">字数</span>
        <span id="wordcount-value" class="wordcount-value">0</span>
      </div>
      <div id="commit-detail" class="commit-detail hidden"></div>
      <div id="commit-list" class="commit-list"></div>
      <div class="toolbar-mode">
        <label class="toggle-pill">
          <input type="checkbox" id="hide-diff-checkbox">
          <span class="toggle-pill-text">隐藏对比</span>
        </label>
        <label class="toggle-pill">
          <input type="checkbox" id="fold-comments-checkbox">
          <span class="toggle-pill-text">隐藏注释</span>
        </label>
      </div>
      <div class="edit-toggle-row">
        <button id="edit-toggle-btn" data-edit-toggle>编辑</button>
      </div>
      <div id="toolbar" class="toolbar">
        <button data-section="title" disabled>复制标题</button>
        <button data-section="summary" disabled>复制摘要</button>
        <button data-section="body">复制正文</button>
        <button data-section="all">复制全部</button>
      </div>
    </aside>
    <div id="status-bar" class="status-bar hidden"></div>
    <div id="modal-container" class="modal-container hidden"></div>
    <div id="toast-container" class="toast-container"></div>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
